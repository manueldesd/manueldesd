<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrot Cake</title>
    <link rel="stylesheet" href="cc.css">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="hamburger-menu" onclick="toggleMenu()">
        <div class="hamburger-icon">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Navigation Menu -->
    <div class="nav-menu" id="navMenu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="fj.html">Carrot Cake</a></li>
        </ul>
    </div>
   <div class="space">
    
   </div>
    <div class="container">
        <h1>Carrot<br>Cake</h1>
        <img src="carrot.png" alt="juice" class="juice">
    </div>

    <hr class="line">
    <h2>Tag Printing Tool</h2>
    <hr class="line">
    <br>
    <div class="container_1">
        <label for="imageInput" class="custom-file-label">Choose Price Tags</label>
        <input type="file" id="imageInput" accept="image/*" multiple hidden>
        <br>
        <div id="imagePreviews"></div>
        <br>
        <button id="generatePDF" disabled>Print Tags</button>
        <br>
        <br>
        <select class="custom-select" id="sizeSelector">
          <option value="original">Shelves</option>
          <option value="fixed">Display</option>
        </select>
    </div>
      

    <footer>
        <p>&copy; 2024 Carrot Cake - All Rights Reserved</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="cscript.js"></script>

    <!-- Register service worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
    <script>
        // Show offline notice when service worker is offline
        window.addEventListener('load', () => {
            if (!navigator.onLine) {
                const offlineNotice = document.createElement('div');
                offlineNotice.classList.add('offline-notice');
                offlineNotice.innerText = 'You are offline. Some features may not work.';
                document.body.appendChild(offlineNotice);
                offlineNotice.style.display = 'block';
            }
        });

        // Monitor online/offline events
        window.addEventListener('online', () => {
            document.querySelector('.offline-notice')?.remove();
        });

        window.addEventListener('offline', () => {
            const offlineNotice = document.createElement('div');
            offlineNotice.classList.add('offline-notice');
            offlineNotice.innerText = 'You are offline. Some features may not work.';
            document.body.appendChild(offlineNotice);
            offlineNotice.style.display = 'block';
        });
    </script>
</body>
</html>
