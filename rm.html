<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        img {
            max-width: 300px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Image Analyzer and Renamer</h1>
    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Analyze and Rename</button>
    </form>

    {% if uploaded_image %}
    <h2>Uploaded and Renamed Image:</h2>
    <img src="{{ url_for('static', filename='uploads/processed/' + uploaded_image) }}" alt="Renamed Image">
    <p><strong>Filename:</strong> {{ uploaded_image }}</p>
    {% endif %}
</body>
</html>
