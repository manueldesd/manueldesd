<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="demo.css">
  <title>Hamburger Dropdown Menu</title>
</head>
<body>
  <!-- Hamburger Menu Button -->
  <div class="hamburger-menu">
    <button class="hamburger" id="hamburger">
      <div class="hamburger-icon">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </button>
  </div>

  <!-- Navigation Menu -->
  <div class="nav-menu" id="nav-menu">
    <div class="menu-header">
      <!-- Logo and Name inside the Hamburger Menu -->
      <img src="mdsd.png" alt="Logo" class="logo">
      <h1>Manuel de Souza-Deacon</h1>
    </div>
    <ul>
      <li class="menu-item">
        <a href="#" class="toggle-link">Dairy Products</a>
        <ul class="submenu">
          <li>Eggs</li>
          <li>Yogurt</li>
        </ul>
      </li>
      <li><a href="#">Cupboard</a></li>
    </ul>
  </div>

  <script src="demo.js"></script>
</body>
</html>
