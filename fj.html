<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fruit Juice</title>
  <link rel="stylesheet" href="sc.css">
  <link rel="stylesheet" href="sc1.css">
  <link rel="icon" href="fj.png" type="image/png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="popupKeyboard" class="keyboard">
    <div class="keys">
      <button class="key">1</button>
      <button class="key">2</button>
      <button class="key">3</button>
      <button class="key">4</button>
      <button class="key">5</button>
      <button class="key">6</button>
      <button class="key">7</button>
      <button class="key">8</button>
      <button class="key">9</button>
      <button class="key">0</button>
      <button class="key" id="backspace">⌫</button>
      <button class="key" id="tab">Tab</button>
    </div>
  </div>
  <div class="container">
    <h1>Denomination Calculator</h1>
    <table>
      <thead>
        <tr>
          <th>Denomination</th>
          <th>QTY</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="denomination-table">
        <tr>
            <td>R200</td>
            <td><input type="number" id="input200"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount200">0</td>
          </tr>
          <tr>
            <td>R100</td>
            <td><input type="number" id="input100"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount100">0</td>
          </tr>
          <tr>
            <td>R50</td>
            <td><input type="number" id="input50"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount50">0</td>
          </tr>
          <tr>
            <td>R20</td>
            <td><input type="number" id="input20"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount20">0</td>
          </tr>
          <tr>
            <td>R10</td>
            <td><input type="number" id="input10"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount10">0</td>
          </tr>
          <tr>
            <td>R5</td>
            <td><input type="number" id="input5"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount5">0</td>
          </tr>
          <tr>
            <td>R2</td>
            <td><input type="number" id="input2"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount2">0</td>
          </tr>
          <tr>
            <td>R1</td>
            <td><input type="number" id="input1"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount1">0</td>
          </tr>
          <tr>
            <td>50c</td>
            <td><input type="number" id="input0.5"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount0.5">0</td>
          </tr>
          <tr>
            <td>20c</td>
            <td><input type="number" id="input0.2"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount0.2">0</td>
          </tr>
          <tr>
            <td>10c</td>
            <td><input type="number" id="input0.1"  min="0" placeholder="" class="popup-input" /></td>
            <td id="amount0.1"></td>
          </tr>
          
          <td colspan="2">Total</td>
          <td id="total">0</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script src="sc.js"></script>
  <script src="sc1.js"></script>
</body>
</html>
